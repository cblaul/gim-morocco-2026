<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* YSL Marrakech Museum-inspired palette */
    --sand: #F7F4F0;
    --sand-light: #FDFCFA;
    --sand-dark: #E9E3DB;
    --terracotta: #B8453A;
    --terracotta-light: #C96B5E;
    --terracotta-dark: #8E3028;
    --earth: #6B5B4E;
    --earth-light: #9A8B7A;
    --deep-brown: #1A1714;
    --warm-black: #0F0D0B;
    --warm-gray: #6E6660;
    --light-gray: #B8B0A8;
    --white: #FFFFFF;
    --majorelle: #6050DC;
    --majorelle-light: #7B6EE3;
    --majorelle-muted: rgba(96, 80, 220, 0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--sand-light);
    color: var(--deep-brown);
    line-height: 1.6;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== NAVIGATION ===== */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(253, 252, 250, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--sand-dark);
    transition: all 0.3s ease;
  }

  nav.scrolled {
    background: rgba(253, 252, 250, 0.98);
    box-shadow: 0 1px 20px rgba(15, 13, 11, 0.06);
  }

  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-brand {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px;
    color: var(--deep-brown);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .nav-brand span { color: var(--terracotta); }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--warm-gray);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active { color: var(--terracotta); }

  /* Mobile hamburger */
  .nav-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
  }

  .nav-toggle span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: var(--deep-brown);
    margin: 5px 0;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 99;
    background: rgba(253, 252, 250, 0.98);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 100px 32px 32px;
  }

  .mobile-menu.active { display: flex; flex-direction: column; gap: 24px; }

  .mobile-menu a {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 32px;
    color: var(--deep-brown);
    text-decoration: none;
    letter-spacing: -0.5px;
    padding: 8px 0;
    border-bottom: 1px solid var(--sand-dark);
  }

  .mobile-menu a:active { color: var(--terracotta); }

  /* ===== HERO ===== */
  .hero {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 120px 32px 80px;
    background: linear-gradient(180deg, var(--sand) 0%, var(--sand-light) 100%);
    position: relative;
    overflow: hidden;
  }
